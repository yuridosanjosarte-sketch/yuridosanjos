<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Yuri dos Anjos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d0d0d;
color:#f5f5f5;
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

/* 🌌 NEBULOSA DE ORION COM REFRAÇÃO */
#refractionCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
pointer-events:none;
}

/* VÉU ESCURO PARA DESTACAR AS OBRAS */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
z-index:-2;
}

/* PARTICLES CANVAS */
#spiritCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* SCROLL PROGRESS */
.scroll-progress{
position:fixed;
top:0;
left:0;
height:3px;
background:#c49b3d;
width:0%;
z-index:3000;
}

/* HEADER */
header{
text-align:center;
padding:60px 10%;
background:#000;
}

header h1{
font-family:'Cinzel',serif;
font-size:42px;
letter-spacing:6px;
}

/* BACK BUTTON */
.back-btn{
position:fixed;
top:25px;
left:25px;
background:rgba(196,155,61,0.9);
color:#000;
padding:8px 18px;
text-decoration:none;
font-weight:500;
font-size:14px;
border-radius:30px;
backdrop-filter: blur(6px);
transition:all 0.3s ease;
z-index:1000;
}

.back-btn:hover{
background:#e0b94f;
transform:translateY(-2px);
}

/* GALLERY */
.gallery{
padding:140px 10%;
}

/* ART BLOCK */
.art-piece{
max-width:1000px;
margin:0 auto 220px auto;
text-align:center;

opacity:0;
transform:translateY(35px);
filter:blur(6px);

transition:
opacity 2.4s cubic-bezier(.22,.61,.36,1),
transform 2.4s cubic-bezier(.22,.61,.36,1),
filter 2.4s cubic-bezier(.22,.61,.36,1);
}

.art-piece.visible{
opacity:1;
transform:translateY(0);
filter:blur(0);
}

/* IMAGE */
.art-piece img{
width:100%;
margin-bottom:60px;
transition:transform 3s ease;
}

.art-piece img:hover{
transform:scale(1.02);
}

/* TITLE */
.art-piece h2{
font-family:'Cinzel',serif;
letter-spacing:4px;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.97);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:opacity 0.6s ease;
z-index:2000;
backdrop-filter:blur(12px);
}

.lightbox.active{
opacity:1;
visibility:visible;
}

.lightbox img{
max-width:85%;
max-height:80%;
animation:cinemaZoom 40s ease-in-out infinite alternate;
}

@keyframes cinemaZoom{
0%{transform:scale(1)}
100%{transform:scale(1.18)}
}

#lightbox-title{
margin-top:30px;
font-family:'Cinzel',serif;
letter-spacing:4px;
font-size:20px;
opacity:0.85;
}

/* CLOSE */
.close{
position:absolute;
top:40px;
right:60px;
font-size:40px;
color:#fff;
cursor:pointer;
}

/* MOBILE */
@media (max-width:480px){

body{
background-attachment:scroll;
}

.back-btn{
top:12px;
left:12px;
padding:5px 12px;
font-size:11px;
}

header{
padding:90px 8% 40px 8%;
}

header h1{
font-size:30px;
letter-spacing:4px;
}

}

</style>
</head>

<body>

<canvas id="refractionCanvas"></canvas>
<canvas id="spiritCanvas"></canvas>

<div class="scroll-progress"></div>

<a href="index.html" class="back-btn">Back to Home</a>

<header>
<h1>Gallery</h1>
</header>

<section class="gallery">

<div class="art-piece">
<img src="etsa-ara.jpg" alt="Etsá Ara">
<h2>Etsá Ara – Eyes of the Sky</h2>
</div>

<div class="art-piece">
<img src="o-espirito.png" alt="O Espírito">
<h2>The Spirit</h2>
</div>
  
<div class="art-piece">
<img src="ipytue.jpg" alt="Ipytuẽ">
<h2>Ipytuẽ – Breathe</h2>
</div>

<div class="art-piece">
<img src="kiririndju.jpg" alt="Kiririndju">
<h2>Kiririndju</h2>
</div>
  
<div class="art-piece">
<img src="djera-poty.jpg" alt="Djera Poty">
<h2>Djera Poty</h2>
</div>

<div class="art-piece">
<img src="mariposa.jpg" alt="Mariposa">
<h2>Mariposa</h2>
</div>

<div class="art-piece">
<img src="obras-e-autor.jpg" alt="Artist and Works">
<h2>Artist & Works</h2>
</div>

</section>

<div class="lightbox" id="lightbox">
<span class="close">&times;</span>
<img src="" id="lightbox-img">
<h3 id="lightbox-title"></h3>
</div>

<script>

/* 🌌 REFRACTION CANVAS */

const refCanvas = document.getElementById("refractionCanvas");
const rCtx = refCanvas.getContext("2d");

refCanvas.width = window.innerWidth;
refCanvas.height = window.innerHeight;

const bgImage = new Image();
bgImage.src = "orion.png";

let time = 0;

bgImage.onload = () => {
  function drawRefraction() {
    rCtx.clearRect(0, 0, refCanvas.width, refCanvas.height);

    const imgDataWidth = refCanvas.width;
    const imgDataHeight = refCanvas.height;

    const amplitude = 3;   // intensidade da refração
    const frequency = 0.03; // frequência da onda

    for(let y = 0; y < imgDataHeight; y += 2){
      const shift = Math.sin(y * frequency + time) * amplitude;
      rCtx.drawImage(
        bgImage,
        0, y, imgDataWidth, 2,
        shift, y, imgDataWidth, 2
      );
    }

    time += 0.05;
    requestAnimationFrame(drawRefraction);
  }

  drawRefraction();
};

/* LIGHTBOX */

const images=document.querySelectorAll(".art-piece img")
const titles=document.querySelectorAll(".art-piece h2")

const lightbox=document.getElementById("lightbox")
const lightboxImg=document.getElementById("lightbox-img")
const lightboxTitle=document.getElementById("lightbox-title")
const closeBtn=document.querySelector(".close")

images.forEach((img,i)=>{
img.addEventListener("click",()=>{
lightbox.classList.add("active")
lightboxImg.src=img.src
lightboxTitle.textContent=titles[i].textContent
})
})

closeBtn.addEventListener("click",()=>{
lightbox.classList.remove("active")
})

lightbox.addEventListener("click",(e)=>{
if(e.target!==lightboxImg){
lightbox.classList.remove("active")
}
})

/* SCROLL REVEAL */

const artObserver=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
const el=entry.target

if(entry.isIntersecting){
el.classList.add("visible")
}else{
const rect=el.getBoundingClientRect()
if(rect.bottom<0||rect.top>window.innerHeight){
el.classList.remove("visible")
}
}
})
},{threshold:0.2})

document.querySelectorAll(".art-piece")
.forEach(el=>artObserver.observe(el))

/* SCROLL PROGRESS */

window.addEventListener("scroll",()=>{

const scrollTop=document.documentElement.scrollTop
const height=document.documentElement.scrollHeight-document.documentElement.clientHeight
const progress=(scrollTop/height)*100

document.querySelector(".scroll-progress").style.width=progress+"%"

})

/* 🌌 STARS */

const canvas=document.getElementById("spiritCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<120;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*1.6,
speed:Math.random()*0.15,
alpha:Math.random()
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stars.forEach(s=>{

s.y-=s.speed

if(s.y<0)s.y=canvas.height

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,"+s.alpha+")"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
